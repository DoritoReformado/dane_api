<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANE API - CENIGAA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #60d850 0%, #8d6613 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 60px 40px;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 3em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #35a800 0%, #9e5501 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1em;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #35a800 0%, #9e5501 100%);
            color: white;
        }

        .btn-secondary {
            background: #f7f7f7;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .info {
            background: #f7f7f7;
            border-radius: 10px;
            padding: 30px;
            margin-top: 30px;
            text-align: left;
        }

        .info h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .info ul {
            list-style: none;
            padding: 0;
        }

        .info li {
            padding: 10px 0;
            color: #666;
            border-bottom: 1px solid #e0e0e0;
        }

        .info li:last-child {
            border-bottom: none;
        }

        .info li strong {
            color: #00ad00;
        }

        .badge {
            display: inline-block;
            background: #0b8a00;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-left: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1><img src="/static/IMG/cenigaalogo.png" alt="CENIGAA Logo" style="height: 50px; vertical-align: middle;">
            DANE API</h1>
        <p class="subtitle">API para el consumo de información recopilada del DANE</p>

        <div class="buttons">
            <a href="/docs" class="btn btn-primary">📚 Documentación Interactiva</a>
            <a href="/redoc" class="btn btn-secondary">📖 ReDoc</a>
        </div>

        <div class="info">
            <h2>Información de la API</h2>
            <ul>
                <li><strong>Versión:</strong> <span class="badge">v0.1.0</span></li>
                <li><strong>Desarrollado por:</strong> Carlos Vidal Gonzalez Lugo</li>
                <li><strong>Organización:</strong> CENIGAA</li>
                <li><strong>Licencia:</strong> MIT</li>
                <li><strong>Contacto:</strong> carlos.vidal@cenigaa.onmicrosoft.com</li>
            </ul>
        </div>
    </div>
</body>

</html>
