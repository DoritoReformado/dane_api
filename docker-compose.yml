services:
  python:
    build:
      context: ./python/
      dockerfile: Dockerfile.dev
    volumes:
      - ./python/Georeferencer:/usr/src/app
    environment:
      - WORKDIRAPP=${WORKDIRAPP}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
    working_dir: ${WORKDIRAPP}
    ports:
      - "8000:8000"
    depends_on:
      - arangodb
      - dragonfly-celery
    command: tail -f /dev/null
    # command: >
    #   bash -lc "
    #   source .venv/bin/activate
    #   cd ./georeferencer
    #   python3 manage.py runserver 0.0.0.0:8000 &
    #   celery -A config worker --loglevel=info &
    #   celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    #   "
  arangodb:
    image: arangodb:latest
    environment:
      - ARANGO_ROOT_PASSWORD=${ARANGODB_ROOT_PASSWORD}
      # opcionalmente, para crear una DB al inicio, puedes usar scripts o luego conectarte y crearla
    ports:
      - "8529:8529"
    volumes:
      - arangodb_data:/var/lib/arangodb3
      - arangodb_apps:/var/lib/arangodb3-apps
  dragonfly-celery:
    image: 'docker.dragonflydb.io/dragonflydb/dragonfly'
    ulimits:
      memlock: -1
    ports:
      - "6379:6379"
volumes:
  arangodb_data:
  arangodb_apps: